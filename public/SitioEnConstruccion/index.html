<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arlequín — Sitio en Construcción</title>
  <link rel="icon" type="image/avif" href="/Cartas/arlequin_escudo_dark.avif" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 24px 16px;
      width: 100%;
      max-height: 100vh;
    }

    .brand {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: clamp(28px, 6vw, 56px);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #e7b81d;
      text-shadow:
        0 0 20px rgba(231, 184, 29, 0.5),
        0 0 60px rgba(231, 184, 29, 0.2);
      animation: glow 3s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 20px rgba(231,184,29,0.4), 0 0 40px rgba(231,184,29,0.1); }
      to   { text-shadow: 0 0 30px rgba(231,184,29,0.7), 0 0 80px rgba(231,184,29,0.3); }
    }

    .banner-wrapper {
      width: 100%;
      max-width: min(720px, 92vw);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(231, 184, 29, 0.15);
    }

    .banner-wrapper img {
      width: 100%;
      height: auto;
      display: block;
    }

    .tagline {
      font-family: 'Cinzel', serif;
      font-size: clamp(11px, 2vw, 16px);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="brand">Arlequín</div>
    <div class="banner-wrapper">
      <img src="/SitioEnConstruccion/Construccion.jpg" alt="Sitio en Construcción" />
    </div>
    <p class="tagline">Próximamente en línea</p>
  </div>
</body>
</html>
